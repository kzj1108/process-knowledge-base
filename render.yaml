# Render Blueprint — Docker 部署（含 STEP/IGES CAD 解析）
services:
  - type: web
    name: process-knowledge-base
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: PKB_DB_DRIVER
        value: sqlite
      - key: PKB_API_KEY
        generateValue: true
      - key: PKB_ADMIN_USER
        value: admin
      - key: PKB_ADMIN_PASS
        generateValue: true
      - key: PKB_TARGET_TOTAL
        value: "50000"
      - key: PKB_DB_PATH
        value: /app/data/pkb.db
      - key: PKB_ROOT
        value: /app
