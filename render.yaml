# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: process-knowledge-base
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && PKB_ROOT=.. PKB_DB_PATH=../data/process_kb.db python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PKB_API_KEY
        generateValue: true
      - key: PKB_ADMIN_USER
        value: admin
      - key: PKB_ADMIN_PASS
        generateValue: true
    # 付费计划可取消注释以持久保存 SQLite（免费版重启后数据可能清空）
    # disk:
    #   name: pkb-data
    #   mountPath: /var/data
    #   sizeGB: 1
